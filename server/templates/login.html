<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Distributed Task Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--c-sidebar);
        }
        .login-card {
            background: var(--c-surface);
            border-radius: var(--r-xl);
            box-shadow: var(--shadow-xl);
            padding: 48px 40px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            border: 1px solid var(--c-border);
        }
        .login-card .icon {
            font-size: 2.5rem;
            color: var(--c-primary);
            margin-bottom: 16px;
        }
        .login-card h1 {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--c-text);
            letter-spacing: -.02em;
        }
        .login-card p {
            color: var(--c-text-secondary);
            margin-bottom: 32px;
            font-size: 0.9rem;
        }
        .login-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--c-primary);
            color: #fff;
            border: none;
            border-radius: var(--r-sm);
            padding: 12px 28px;
            font-size: .9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all var(--dur-fast) var(--ease);
        }
        .login-btn:hover {
            background: var(--c-primary-dark);
            box-shadow: 0 4px 14px rgba(99,102,241,.3);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="icon"><i class="fas fa-tasks"></i></div>
        <h1>Distributed Task Management</h1>
        <p>Sign in to create and manage tasks.</p>
        {% if error %}
        <div style="color: var(--c-danger); background: #fee2e2; border-radius: var(--r-sm); padding: 10px 16px; margin-bottom: 20px; font-size: 0.875rem;">
            {{ error }}
        </div>
        {% endif %}

        {% if show_manual %}
        <!-- Manual alias login for when MSAL and Windows auto-detect are not available -->
        <form method="POST" action="{{ url_for('manual_login') }}" style="margin-bottom: 20px;">
            <div style="text-align: left; margin-bottom: 14px;">
                <label style="font-weight: 600; font-size: .85rem; color: var(--c-text); display: block; margin-bottom: 6px;">Microsoft Alias</label>
                <input type="text" name="alias" placeholder="e.g. ygu" required
                       style="width: 100%; padding: 9px 14px; border: 1.5px solid var(--c-input-border); border-radius: var(--r-sm); font-size: .875rem;">
            </div>
            <button type="submit" class="login-btn" style="width: 100%; justify-content: center; border: none;">
                <i class="fas fa-sign-in-alt"></i>
                Sign In
            </button>
        </form>
        {% else %}
        <a href="{{ url_for('login', action='signin') }}" class="login-btn">
            <i class="fab fa-microsoft"></i>
            Sign in with Microsoft
        </a>
        {% endif %}
    </div>
</body>
</html>
